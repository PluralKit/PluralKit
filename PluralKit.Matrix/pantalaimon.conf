# Pantalaimon reference configuration for PluralKit Matrix bridge
#
# NOTE: Pantalaimon only works with /sync-based bot mode, NOT with the
# Application Service transaction push model that PluralKit.Matrix uses.
# This configuration is provided as reference for a potential future
# architecture change to sync-based operation.
#
# With the current appservice architecture:
# - Outbound API calls (sending messages, setting profiles) go through pantalaimon
# - Inbound events are pushed by the homeserver directly to the appservice
#   via /_matrix/app/v1/transactions, bypassing pantalaimon entirely
# - Therefore, encrypted events still arrive as m.room.encrypted ciphertext
#
# For E2EE support in appservice mode, MSC3202 (encrypted appservice support)
# and C# Olm/Megolm bindings are required. Track upstream for updates.

[Default]
Homeserver = http://synapse:8008
ListenAddress = 0.0.0.0
ListenPort = 8009
IgnoreVerification = true
UseKeyring = false
